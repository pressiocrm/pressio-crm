<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect width="256" height="256" rx="56" fill="url(#shine)"/>

  <!-- Stylized P letterform with integrated pipeline nodes -->
  <!-- Main P stroke - vertical stem -->
  <path d="M 80 196 L 80 68 Q 80 56 92 56 L 140 56 Q 184 56 184 92 Q 184 128 140 128 L 104 128"
        stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Three pipeline dots flowing from the P -->
  <circle cx="152" cy="160" r="9" fill="white" opacity="0.9"/>
  <circle cx="176" cy="180" r="7" fill="white" opacity="0.6"/>
  <circle cx="192" cy="200" r="5" fill="white" opacity="0.35"/>
</svg>
